<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>OTP Analytics</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="max-w-7xl mx-auto px-4 py-8">

    <div class="mb-8">
      <h1 class="text-3xl font-bold text-gray-900">OTP Service Analytics</h1>
      <p class="text-gray-500 mt-1">Read-only usage statistics</p>
    </div>

    <!-- Summary Cards -->
    <div class="grid grid-cols-2 md:grid-cols-4 gap-4 mb-6">
      <div class="bg-white rounded-lg shadow p-5">
        <div class="text-sm font-medium text-gray-500">Total Issued</div>
        <div class="text-3xl font-bold text-gray-900 mt-1" id="statIssued">—</div>
      </div>
      <div class="bg-white rounded-lg shadow p-5">
        <div class="text-sm font-medium text-gray-500">Verified</div>
        <div class="text-3xl font-bold text-green-600 mt-1" id="statVerified">—</div>
      </div>
      <div class="bg-white rounded-lg shadow p-5">
        <div class="text-sm font-medium text-gray-500">Expired</div>
        <div class="text-3xl font-bold text-red-500 mt-1" id="statExpired">—</div>
      </div>
      <div class="bg-white rounded-lg shadow p-5">
        <div class="text-sm font-medium text-gray-500">Pending</div>
        <div class="text-3xl font-bold text-yellow-500 mt-1" id="statPending">—</div>
      </div>
    </div>

    <!-- Filters -->
    <div class="bg-white rounded-lg shadow p-5 mb-6">
      <div class="flex flex-wrap gap-4 items-end">
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">From</label>
          <input type="date" id="filterFrom" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">To</label>
          <input type="date" id="filterTo" class="border border-gray-300 rounded px-3 py-2 text-sm focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700 mb-1">Email</label>
          <input type="text" id="filterEmail" placeholder="Search email…"
            class="border border-gray-300 rounded px-3 py-2 text-sm w-52 focus:outline-none focus:ring-2 focus:ring-blue-500">
        </div>
        <button onclick="applyFilters()"
          class="bg-blue-600 hover:bg-blue-700 text-white px-4 py-2 rounded text-sm font-medium transition-colors">
          Apply
        </button>
        <button onclick="clearFilters()"
          class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded text-sm font-medium transition-colors">
          Clear
        </button>
        <button onclick="loadStats()"
          class="border border-gray-300 hover:bg-gray-50 text-gray-700 px-4 py-2 rounded text-sm font-medium transition-colors ml-auto">
          ↻ Refresh
        </button>
      </div>
    </div>

    <!-- Records Table -->
    <div class="bg-white rounded-lg shadow overflow-hidden">
      <div class="px-5 py-4 border-b border-gray-200 flex justify-between items-center">
        <h2 class="text-lg font-semibold text-gray-800">Records</h2>
        <span class="text-sm text-gray-500" id="recordCount">—</span>
      </div>

      <div class="overflow-x-auto">
        <table class="min-w-full divide-y divide-gray-200">
          <thead class="bg-gray-50">
            <tr>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">ID</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Email</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Issued At</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Expires At</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Status</th>
              <th class="px-4 py-3 text-left text-xs font-medium text-gray-500 uppercase tracking-wider">Used At</th>
            </tr>
          </thead>
          <tbody id="recordsBody" class="divide-y divide-gray-100 bg-white">
            <tr><td colspan="6" class="px-4 py-10 text-center text-gray-400">Loading…</td></tr>
          </tbody>
        </table>
      </div>

      <!-- Pagination -->
      <div class="px-5 py-4 border-t border-gray-200 flex items-center justify-between">
        <button id="btnPrev" onclick="prevPage()" disabled
          class="px-4 py-2 text-sm border border-gray-300 rounded disabled:opacity-40 hover:enabled:bg-gray-50 transition-colors">
          ← Previous
        </button>
        <span class="text-sm text-gray-600" id="pageInfo">Page 1</span>
        <button id="btnNext" onclick="nextPage()"
          class="px-4 py-2 text-sm border border-gray-300 rounded disabled:opacity-40 hover:enabled:bg-gray-50 transition-colors">
          Next →
        </button>
      </div>
    </div>

  </div>

  <script>
    const LIMIT = 20;
    let offset = 0;
    let total = 0;

    function filters() {
      const from = document.getElementById('filterFrom').value;
      const to   = document.getElementById('filterTo').value;
      return {
        from:  from  ? from + 'T00:00:00' : '',
        to:    to    ? to   + 'T23:59:59' : '',
        email: document.getElementById('filterEmail').value,
      };
    }

    async function loadStats() {
      const { from, to, email } = filters();
      const p = new URLSearchParams({ limit: LIMIT, offset });
      if (from)  p.set('from',  from);
      if (to)    p.set('to',    to);
      if (email) p.set('email', email);

      const tbody = document.getElementById('recordsBody');

      try {
        const resp = await fetch('/api/stats?' + p.toString());
        if (!resp.ok) { const e = await resp.json(); throw new Error(e.error || resp.statusText); }
        const data = await resp.json();

        document.getElementById('statIssued').textContent   = data.summary.total_issued;
        document.getElementById('statVerified').textContent = data.summary.total_verified;
        document.getElementById('statExpired').textContent  = data.summary.total_expired;
        document.getElementById('statPending').textContent  = data.summary.total_pending;

        total = data.total;
        document.getElementById('recordCount').textContent =
          total.toLocaleString() + ' record' + (total !== 1 ? 's' : '');
        document.getElementById('pageInfo').textContent =
          'Page ' + (Math.floor(offset / LIMIT) + 1) + ' of ' + Math.max(1, Math.ceil(total / LIMIT));

        document.getElementById('btnPrev').disabled = offset === 0;
        document.getElementById('btnNext').disabled = offset + LIMIT >= total;

        if (!data.records || data.records.length === 0) {
          tbody.innerHTML = '<tr><td colspan="6" class="px-4 py-10 text-center text-gray-400">No records found</td></tr>';
          return;
        }

        tbody.innerHTML = data.records.map(r => {
          const now     = Date.now();
          const expires = new Date(r.expires_at).getTime();
          let badge;
          if (r.used) {
            badge = '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-green-100 text-green-800">Verified</span>';
          } else if (expires < now) {
            badge = '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-red-100 text-red-800">Expired</span>';
          } else {
            badge = '<span class="px-2 py-0.5 rounded-full text-xs font-medium bg-yellow-100 text-yellow-800">Pending</span>';
          }
          return `<tr class="hover:bg-gray-50">
            <td class="px-4 py-3 text-sm text-gray-400">${r.id}</td>
            <td class="px-4 py-3 text-sm font-medium text-gray-900">${esc(r.email)}</td>
            <td class="px-4 py-3 text-sm text-gray-500">${fmt(r.created_at)}</td>
            <td class="px-4 py-3 text-sm text-gray-500">${fmt(r.expires_at)}</td>
            <td class="px-4 py-3">${badge}</td>
            <td class="px-4 py-3 text-sm text-gray-500">${r.used_at ? fmt(r.used_at) : '—'}</td>
          </tr>`;
        }).join('');
      } catch (err) {
        tbody.innerHTML =
          `<tr><td colspan="6" class="px-4 py-10 text-center text-red-500">Error: ${esc(err.message)}</td></tr>`;
      }
    }

    function fmt(ts) {
      if (!ts) return '—';
      return new Date(ts).toLocaleString();
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    function applyFilters() { offset = 0; loadStats(); }
    function clearFilters()  {
      ['filterFrom','filterTo','filterEmail'].forEach(id => document.getElementById(id).value = '');
      offset = 0;
      loadStats();
    }
    function prevPage() { if (offset >= LIMIT)  { offset -= LIMIT; loadStats(); } }
    function nextPage() { if (offset + LIMIT < total) { offset += LIMIT; loadStats(); } }

    loadStats();
  </script>
</body>
</html>
